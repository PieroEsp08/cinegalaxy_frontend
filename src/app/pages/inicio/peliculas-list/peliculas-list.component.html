<h2 class="titulo-peliculas text-center my-4">Cartelera</h2>

<div class="container">
  <div class="row">
    <div 
      class="col-6 col-md-4 col-lg-3 mb-4"
      *ngFor="let pelicula of peliculas | slice:0:8">
      
      <app-card-pelicula [pelicula]="pelicula"></app-card-pelicula>
    </div>
  </div>

  <div class="ver-mas-container">
    <button class="ver-mas-btn" (click)="irACartelera()">Ver más</button>
  </div>

</div>
