<section class="cartelera">
  <div class="seccion-header">
    <div>
      <div class="seccion-tag">En cines ahora</div>
      <div class="seccion-titulo">Cartelera</div>
    </div>
    <button class="seccion-link" (click)="irACartelera()">Ver toda la cartelera →</button>
  </div>

  <div class="peliculas-grid">
    <div *ngFor="let pelicula of peliculas | slice:0:8">
      <app-card-pelicula [pelicula]="pelicula"></app-card-pelicula>
    </div>
  </div>
</section>
