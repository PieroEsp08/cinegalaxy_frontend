<div class="sala-container">
 

  <!-- Filas -->
  <div class="filas">
    <div class="fila" *ngFor="let fila of [].constructor(10); let i = index">
      
      <!-- Etiqueta de fila (lado izquierdo) -->
      <div class="fila-label">
        {{ getRowLabel(i) }}
      </div>

      <!-- Laterales (2 asientos) -->
      <div class="laterales">
        <div class="asiento-container" *ngFor="let l of [].constructor(2); let j = index">
          <div class="asiento">
            <!-- SVG de asiento -->
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><title>sofa-single</title><path d="M5 9.15V7C5 5.9 5.9 5 7 5H17C18.1 5 19 5.9 19 7V9.16C17.84 9.57 17 10.67 17 11.97V14H7V11.96C7 10.67 6.16 9.56 5 9.15M20 10C18.9 10 18 10.9 18 12V15H6V12C6 10.9 5.11 10 4 10S2 10.9 2 12V17C2 18.1 2.9 19 4 19V21H6V19H18V21H20V19C21.1 19 22 18.1 22 17V12C22 10.9 21.1 10 20 10Z" /></svg>
          </div>
          <div class="tooltip">{{ getSeatLabel(i, j) }}</div>
        </div>
      </div>

      <!-- Centro (15 asientos) -->
      <div class="centro">
        <div class="asiento-container" *ngFor="let c of [].constructor(15); let j = index">
          <div class="asiento">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><title>sofa-single</title><path d="M5 9.15V7C5 5.9 5.9 5 7 5H17C18.1 5 19 5.9 19 7V9.16C17.84 9.57 17 10.67 17 11.97V14H7V11.96C7 10.67 6.16 9.56 5 9.15M20 10C18.9 10 18 10.9 18 12V15H6V12C6 10.9 5.11 10 4 10S2 10.9 2 12V17C2 18.1 2.9 19 4 19V21H6V19H18V21H20V19C21.1 19 22 18.1 22 17V12C22 10.9 21.1 10 20 10Z" /></svg>
          </div>
          <div class="tooltip">{{ getSeatLabel(i, j + 2) }}</div>
        </div>
      </div>

      <!-- Laterales (2 asientos) -->
      <div class="laterales">
        <div class="asiento-container" *ngFor="let r of [].constructor(2); let j = index">
          <div class="asiento">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><title>sofa-single</title><path d="M5 9.15V7C5 5.9 5.9 5 7 5H17C18.1 5 19 5.9 19 7V9.16C17.84 9.57 17 10.67 17 11.97V14H7V11.96C7 10.67 6.16 9.56 5 9.15M20 10C18.9 10 18 10.9 18 12V15H6V12C6 10.9 5.11 10 4 10S2 10.9 2 12V17C2 18.1 2.9 19 4 19V21H6V19H18V21H20V19C21.1 19 22 18.1 22 17V12C22 10.9 21.1 10 20 10Z" /></svg>
          </div>
          <div class="tooltip">{{ getSeatLabel(i, j + 17) }}</div>
        </div>
      </div>

      <!-- Etiqueta de fila (lado derecho) -->
      <div class="fila-label">
        {{ getRowLabel(i) }}
      </div>
    </div>
  </div>

   <!-- Pantalla -->
  <div class="pantalla">Pantalla</div>

</div>
