<div class="pelicula-card">
  <div class="imagen-container">
    <img [src]="pelicula.imagen" [alt]="pelicula.titulo" />
    <span class="badge-estreno" *ngIf="pelicula?.estadoEstreno === 1">Estreno</span>
  </div>

  <div class="contenido">
    <h3>{{ pelicula.titulo }}</h3>
  <div class="info">
    <span><strong>Duración:</strong> {{ pelicula.duracion }} min</span>
    <span><strong>Género:</strong> {{ pelicula.genero }}</span>
  </div>
  <div class="botones">
    <button class="comprar">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="16" height="16">
        <path fill="currentColor" d="M15.58,16.8L12,14.5L8.42,16.8L9.5,12.68L6.21,10L10.46,9.74L12,5.8L13.54,9.74L17.79,10L14.5,12.68M20,12C20,10.89 20.9,10 22,10V6C22,4.89 21.1,4 20,4H4A2,2 0 0,0 2,6V10C3.11,10 4,10.9 4,12A2,2 0 0,1 2,14V18A2,2 0 0,0 4,20H20A2,2 0 0,0 22,18V14A2,2 0 0,1 20,12Z"/>
      </svg>
      Comprar
    </button>
    <button class="detalles">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
        <path fill="currentColor" d="M17,13H13V17H11V13H7V11H11V7H13V11H17M12,2A10,10 0 0,0 2,12A10,10 0 0,0 12,22A10,10 0 0,0 22,12A10,10 0 0,0 12,2Z"/>
      </svg>
      Ver Detalles
    </button>
  </div>
</div>

</div>
