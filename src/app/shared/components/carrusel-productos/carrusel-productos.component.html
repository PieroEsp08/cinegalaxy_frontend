<div class="carrusel-wrapper">
  <button class="carrusel-arrow" (click)="cambiarSlide(-1)" [disabled]="slideActual === 0">‹</button>

  <div class="carrusel-outer">
    <div class="carrusel-track" #track [style.transform]="'translateX(' + desplazamiento + ')'">
      <div class="producto-card" *ngFor="let producto of productos">
        <div class="producto-img-wrap">
          <img [src]="producto.imagen" [alt]="producto.nombre" class="producto-img">
        </div>
        <div class="producto-info">
          <div class="producto-nombre">{{ producto.nombre }}</div>
          <div class="producto-precio">S/ {{ producto.precio }}</div>
          <button class="producto-btn">Agregar →</button>
        </div>
      </div>
    </div>
  </div>

  <button class="carrusel-arrow" (click)="cambiarSlide(1)" [disabled]="slideActual === maxSlide">›</button>
</div>

<div class="carrusel-dots-wrapper">
  <div class="carrusel-dots">
    <button class="carrusel-dot"
            *ngFor="let d of dots; let i = index"
            [class.active]="i === slideActual"
            (click)="irSlide(i)">
    </button>
  </div>
</div>
